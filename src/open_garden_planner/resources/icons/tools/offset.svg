<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Outer offset shape -->
  <rect x="1.5" y="4.5" width="18" height="15" rx="2"
        stroke="#333" stroke-width="1.8"/>
  <!-- Inner original shape (dashed) -->
  <rect x="4.5" y="7.5" width="12" height="9" rx="1.5"
        stroke="#333" stroke-width="1.5" stroke-dasharray="2,1.5" opacity="0.6"/>
  <!-- Outward arrow (right side) -->
  <line x1="20" y1="12" x2="23" y2="12"
        stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="21.5,10.5 23,12 21.5,13.5"
            stroke="#333" stroke-width="1.5" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
