<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Text box (rounded rect, upper right) -->
  <rect x="26" y="8" width="32" height="22" rx="3" fill="white" stroke="#1F2937" stroke-width="2.5"/>
  <!-- Text lines inside box -->
  <line x1="32" y1="15" x2="52" y2="15" stroke="#1F2937" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="21" x2="46" y2="21" stroke="#1F2937" stroke-width="2" stroke-linecap="round"/>
  <!-- Leader line from box bottom-left corner to arrow tip -->
  <line x1="28" y1="29" x2="12" y2="50" stroke="#1F2937" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arrowhead triangle at tip (pointing at annotated target) -->
  <polygon points="12,50 22,43 16,41" fill="#1F2937"/>
</svg>
