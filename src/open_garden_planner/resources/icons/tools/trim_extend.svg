<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Horizontal line being cut — left piece -->
  <line x1="12.5" y1="12" x2="23" y2="12" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <!-- Right piece (dashed, to be trimmed) -->
  <line x1="0" y1="12" x2="10.5" y2="12" stroke="#333" stroke-width="2" stroke-dasharray="2,1.5" stroke-linecap="round" opacity="0.45"/>

  <!-- Upper scissor blade: handle ring → pivot → tip -->
  <line x1="5" y1="4" x2="12.5" y2="11.5" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Lower scissor blade: handle ring → pivot → tip -->
  <line x1="5" y1="20" x2="12.5" y2="12.5" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Upper handle ring -->
  <circle cx="3.5" cy="4" r="2.8" stroke="#333" stroke-width="1.5" fill="white"/>
  <!-- Lower handle ring -->
  <circle cx="3.5" cy="20" r="2.8" stroke="#333" stroke-width="1.5" fill="white"/>

  <!-- Pivot screw -->
  <circle cx="9.5" cy="10" r="1.5" fill="#333"/>
</svg>
