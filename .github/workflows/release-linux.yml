name: Release (Linux)

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release-linux:
    name: Build & Release (Linux)
    runs-on: ubuntu-latest
    # Skip chore commits (same logic as Windows release)
    if: "!startsWith(github.event.head_commit.message, 'chore:') && !startsWith(github.event.head_commit.message, 'chore(')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git tags

      - name: Determine version
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get latest tag version
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Get labels from the merged PR that triggered this push
          PR_NUMBER=$(gh pr list --state merged --base master --limit 1 --json number --jq '.[0].number')
          LABELS=""
          if [ -n "$PR_NUMBER" ]; then
            LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name' 2>/dev/null || echo "")
          fi

          # Determine bump type
          if echo "$LABELS" | grep -q "major"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif echo "$LABELS" | grep -q "minor"; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $NEW_VERSION"

      - name: Check if tag already exists
        id: check_tag
        shell: bash
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if tag exists
        if: steps.check_tag.outputs.exists == 'true'
        run: echo "Tag ${{ steps.version.outputs.tag }} already exists, skipping release."

      - name: Set up Python 3.11
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-xinerama0 libxcb-cursor0 libxkbcommon-x11-0 \
            libgl1-mesa-glx libegl1-mesa libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libfuse2 file wget

      - name: Install Python dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Download appimagetool
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          sudo mv appimagetool-x86_64.AppImage /usr/local/bin/appimagetool

      - name: Create app icon PNG
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          # Convert .ico to .png using Python/Pillow (already installed)
          python -c "
          from PIL import Image
          img = Image.open('installer/ogp_app.ico')
          img.save('installer/ogp_app.png', 'PNG')
          "

      - name: Build AppImage
        if: steps.check_tag.outputs.exists == 'false'
        run: python installer/build_appimage.py --version ${{ steps.version.outputs.version }}

      - name: Generate checksum
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          cd dist
          sha256sum Open_Garden_Planner-v${{ steps.version.outputs.version }}-x86_64.AppImage > SHA256SUMS-linux.txt
          cat SHA256SUMS-linux.txt

      - name: Upload to existing release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Wait a moment for Windows release to create the tag/release
          sleep 10
          # Upload Linux artifacts to the same release
          gh release upload ${{ steps.version.outputs.tag }} \
            "dist/Open_Garden_Planner-v${{ steps.version.outputs.version }}-x86_64.AppImage" \
            "dist/SHA256SUMS-linux.txt" \
            --clobber || \
          echo "Release upload failed; may need manual upload if Windows release hasn't finished"
